# One command to run the whole stack: `docker compose up --build`
# Then open http://localhost:3000 (UI) and http://localhost:8080 (API).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biz_launch
    ports:
      # Host port is overridable (set DB_PORT) to avoid clashes with a local
      # Postgres or another stack already on 5432.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biz_launch"]
      interval: 3s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/biz_launch?sslmode=disable"
      CORS_ORIGIN: "*"
      DB_MAX_CONNS: "${DB_MAX_CONNS:-10}"
      # Payment sandbox keys — leave blank to use the deterministic mock.
      RAZORPAY_KEY_ID: "${RAZORPAY_KEY_ID:-}"
      RAZORPAY_KEY_SECRET: "${RAZORPAY_KEY_SECRET:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      PAYMONGO_SECRET_KEY: "${PAYMONGO_SECRET_KEY:-}"
      # AI strategy (Claude) + sanctions screening (trade.gov CSL).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-6}"
      CSL_API_KEY: "${CSL_API_KEY:-}"
      FORCE_MOCK: "${FORCE_MOCK:-false}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
